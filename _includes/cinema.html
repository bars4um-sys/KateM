<section id="cinema">
  <div class="container">
    <div class="section-label reveal">Кино и театр</div>
    <h2 class="section-title reveal reveal-delay-1">Режиссура <span class="italic">и постановки</span></h2>
    <div class="cinema-grid">
      {% for col in site.data.cinema %}
        <div class="cinema-col reveal reveal-delay-{% cycle 2, 3 %}">
          <h3>{{ col.title }}</h3>
          {% for item in col.items %}
            <div class="cinema-item">
              <div class="cinema-year">{{ item.year }}</div>
              <div class="cinema-content">
                <h4>{{ item.title }}</h4>
                {% if item.desc and item.desc != "" %}<p>{{ item.desc }}</p>{% endif %}
              </div>
            </div>
          {% endfor %}
        </div>
      {% endfor %}
    </div>
  </div>
</section>
