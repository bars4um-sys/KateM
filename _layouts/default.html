<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

<!-- PRELOADER -->
<div id="preloader">
  <div class="preloader-text">Екатерина Москвина</div>
  <div class="preloader-bar"></div>
</div>

<!-- NAVIGATION -->
<nav id="nav">
  <div class="nav-inner">
    <a href="#" class="nav-logo">Екатерина <span>Москвина</span></a>
    <div class="nav-links" id="navLinks">
      <a href="#about">О себе</a>
      <a href="#teaching">Преподавание</a>
      <a href="#science">Наука</a>
      <a href="#cinema">Кино</a>
      <a href="#contacts">Контакты</a>
    </div>
    <button class="nav-burger" id="navBurger" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

{{ content }}

<!-- FOOTER -->
<footer>
  <div class="container">
    <p>© {{ 'now' | date: '%Y' }} Екатерина Москвина · Филолог, режиссёр, доцент НИУ ВШЭ</p>
  </div>
</footer>

<script src="https://unpkg.com/lucide@latest" defer></script>
<script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
